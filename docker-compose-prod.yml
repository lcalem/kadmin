version: '3.3'

services:
  db:
    image: postgres:15
    security_opt:
      - seccomp=unconfined
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    security_opt:
      - seccomp=unconfined
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/appdb
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - default
      - proxy
    command: uvicorn routes:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run build && npx serve -s dist -l 5173"
    environment:
            - VITE_API_URL=https://api.kadmin.lcalem.com:8000
    networks:
      - default
      - proxy

volumes:
  db_data:
  uploads:

networks:
  proxy:
    external: true
